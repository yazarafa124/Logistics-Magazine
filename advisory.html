<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advisory Board — Logistics Magazine</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="inner.css">
</head>
<body>
<div id="nav-placeholder"></div>
<header class="page-header">
  <div class="section-label">Editorial Authority</div>
  <h1>Advisory Board.</h1>
  <p>A global panel of sector leaders, legal experts, and senior government officials who ensure the editorial rigour and strategic relevance of every issue.</p>
</header>
<div class="advisory-grid" id="advisory-page-grid"></div>
<div id="footer-placeholder"></div>
<script src="main.js"></script>
<script src="components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('advisory-page-grid');
  if (!grid) return;
  const extended = [
    ...CONFIG.advisoryBoard,
    { name: "Dr. Yusuf Ndoye", title: "Director-General, Port Authority of Dakar", country: "Senegal", linkedin: "#" },
    { name: "Mr. Hiroshi Nakamura", title: "Senior VP, Nippon Yusen Kabushiki Kaisha (NYK Line)", country: "Japan", linkedin: "#" },
    { name: "Dr. Layla Al-Farsi", title: "Legal Counsel, Oman Maritime Authority", country: "Oman", linkedin: "#" },
  ];
  extended.forEach((m, i) => {
    const initials = m.name.split(' ').map(n => n[0]).join('').slice(0, 2);
    const div = document.createElement('div');
    div.className = 'advisory-card reveal';
    div.style.transitionDelay = `${i * 0.07}s`;
    div.innerHTML = `
      <div class="advisory-card-avatar">${initials}</div>
      <div class="advisory-card-name">${m.name}</div>
      <div class="advisory-card-title">${m.title}</div>
      <div class="advisory-card-country">${m.country}</div>
      <a href="${m.linkedin}" target="_blank" class="advisory-card-li">View LinkedIn Profile →</a>`;
    grid.appendChild(div);
  });
});
</script>
</body>
</html>
