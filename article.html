<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — Logistics Magazine</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="article.css">
</head>
<body>

<div id="nav-placeholder"></div>

<section class="article-hero" id="article-hero-dynamic">
  <div class="article-hero-image">
    <div class="article-hero-img-placeholder">
      <div class="placeholder-label">[ Loading ]</div>
    </div>
    <div class="article-hero-overlay"></div>
  </div>
  <div class="article-hero-content">
    <div class="article-meta-top">
      <span class="article-category">Intelligence</span>
    </div>
    <h1 class="article-title">Loading...</h1>
  </div>
</section>

<div class="article-layout">
  <aside class="article-sidebar">
    <div class="sidebar-share">
      <div class="sidebar-label">Share</div>
      <div class="share-links">
        <a href="#" class="share-btn">LinkedIn</a>
        <a href="#" class="share-btn">X / Twitter</a>
        <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href);this.textContent='Copied!'">Copy Link</button>
      </div>
    </div>
    <div class="sidebar-tags">
      <div class="sidebar-label">Tags</div>
      <div class="tag-list" id="tag-list"></div>
    </div>
  </aside>
  <article class="article-body">
    <div id="article-dynamic-content">
      <p style="color:#aaa;font-family:Jost,sans-serif;font-size:0.8rem">Loading article...</p>
    </div>
  </article>
</div>

<section class="related-articles">
  <div class="related-inner">
    <div class="section-label" style="color:#25380E">Continue Reading</div>
    <h2 class="related-title">Related Intelligence</h2>
    <div class="related-grid" id="related-grid"></div>
  </div>
</section>

<div id="footer-placeholder"></div>

<!-- Load nav/footer first -->
<script src="main.js"></script>
<script src="components.js"></script>

<!-- Then load article engine and render -->
<script src="articles.js"></script>
<script>
(function() {
  function init() {
    if (typeof renderArticlePage === 'function' && typeof getArticles === 'function') {
      renderArticlePage();
    } else {
      document.getElementById('article-dynamic-content').innerHTML =
        '<p style="color:red;font-family:Jost,sans-serif">Failed to load article engine. Please refresh.</p>';
    }
  }

  if (document.readyState === 'complete') {
    init();
  } else {
    window.addEventListener('load', init);
  }
})();
</script>

</body>
</html>
