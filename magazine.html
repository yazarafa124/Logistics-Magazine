<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read the Magazine — Logistics Magazine</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="inner.css">
  <style>
    .magazine-reader {
      padding-top: var(--nav-height);
      background: #0A0A0A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .magazine-reader-header {
      padding: 2rem 3rem 1.5rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .magazine-reader-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #F9F9F7;
    }
    .magazine-reader-header p {
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(249,249,247,0.4);
      margin-top: 0.2rem;
    }
    .flipbook-container {
      flex: 1;
      width: 100%;
      min-height: calc(100vh - var(--nav-height) - 80px);
    }
    .flipbook-container iframe {
      width: 100%;
      height: calc(100vh - var(--nav-height) - 80px);
      border: none;
      display: block;
    }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="magazine-reader">
  <div class="magazine-reader-header">
    <div>
      <h1 id="magazine-title">Logistics Magazine</h1>
      <p id="magazine-issue">Inaugural Issue · May 2026</p>
    </div>
    <a href="issues.html" class="btn-ghost" style="font-size:0.6rem">← Back to All Issues</a>
  </div>
  <div class="flipbook-container">
    <iframe src="https://online.fliphtml5.com/LOGISTICS/LOGISTICS/" allowfullscreen></iframe>
  </div>
</div>

<script src="main.js"></script>
<script src="components.js"></script>
</body>
</html>
